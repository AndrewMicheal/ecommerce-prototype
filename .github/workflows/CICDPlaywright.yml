name: CI/CD Playwright + Deploy

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: Create physical .env file for dotenvx
        run: |
          echo "EMAIL_SUCCESS=${{ secrets.EMAIL_SUCCESS }}" > .env
          echo "PASSWORD_SUCCESS=${{ secrets.PASSWORD_SUCCESS }}" >> .env
          echo "EMAIL_FAIL=${{ secrets.EMAIL_FAIL }}" >> .env
          echo "PASSWORD_ERROR=${{ secrets.PASSWORD_ERROR }}" >> .env

      # تشغيل الاختبارات
      - name: Run Playwright tests
        run: npx playwright test --reporter=html
        env:
          EMAIL_SUCCESS: ${{ secrets.EMAIL_SUCCESS }}
          PASSWORD_SUCCESS: ${{ secrets.PASSWORD_SUCCESS }}
          EMAIL_FAIL: ${{ secrets.EMAIL_FAIL }}
          PASSWORD_ERROR: ${{ secrets.PASSWORD_ERROR }}

      - name: Upload Playwright Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Deploy to Vercel
        if: success()
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'